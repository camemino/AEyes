<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="A-Eyes — assistive vision app for the visually impaired">
    <title>A-Eyes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════════════════
       Écran principal — caméra + 4 boutons d'action
       Correspond à MainScreen dans Kivy
  ══════════════════════════════════════════════════════════════════════════ -->
  <main id="main-screen" role="main" aria-label="A-Eyes main screen">

    <!-- Vidéo caméra invisible — utilisée uniquement pour la capture de frames -->
    <video id="camera-view"
           style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"
           autoplay
           playsinline
           muted
           aria-hidden="true"></video>

    <!-- Bouton DESCRIBE — pleine largeur -->
    <button id="btn-describe"
            class="btn btn-describe"
            aria-label="Describe the current scene">
      DESCRIBE
    </button>

    <!-- TEXT + DETAILS + ASK — côte à côte -->
    <div class="btn-row">
      <button id="btn-text"
              class="btn btn-text"
              aria-label="Read text in the current scene">
        TEXT
      </button>
      <button id="btn-details"
              class="btn btn-details"
              aria-label="Get a detailed description of the current scene">
        DETAILS
      </button>
      <button id="btn-ask"
              class="btn btn-ask"
              aria-label="Ask a question about the last image">
        ASK
      </button>
    </div>

    <!-- Bouton FIND — recherche guidée d'un objet — pleine largeur -->
    <button id="btn-find"
            class="btn btn-find"
            aria-label="Find an object by voice guidance">
      FIND
    </button>

    <!-- Bouton REPEAT — relit le dernier message TTS -->
    <button id="btn-repeat"
            class="btn btn-repeat"
            aria-label="Repeat last spoken message">
      REPEAT
    </button>

  </main>


  <!-- ══════════════════════════════════════════════════════════════════════
       Overlay STOP — visible uniquement pendant une session FIND
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="find-overlay" hidden role="status" aria-live="polite">
    <p class="find-overlay-text">
      Searching for <span id="find-target"></span>…
    </p>
    <span id="find-status" hidden aria-hidden="true"></span>
    <button id="btn-find-stop"
            class="btn btn-stop"
            aria-label="Stop search">
      STOP
    </button>
  </div>


  <script type="module" src="js/app.js"></script>
</body>
</html>

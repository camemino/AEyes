services:
  - type: web
    name: a-eyes
    runtime: python
    plan: free
    region: frankfurt          # le plus proche d'Europe ; remplacer par "oregon" si US

    rootDir: backend           # uvicorn est lancé depuis backend/
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false          # valeur saisie manuellement dans le dashboard Render
